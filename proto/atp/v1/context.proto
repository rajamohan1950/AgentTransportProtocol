syntax = "proto3";
package atp.v1;

import "atp/v1/common.proto";

message ContextChunk {
  uint32 index = 1;
  bytes data = 2;
  double relevance_score = 3;
}

message ContextDiff {
  bytes base_hash = 1;
  repeated ContextChunk chunks = 2;
  double confidence = 3;
  uint64 original_size = 4;
  uint64 compressed_size = 5;
}

message ContextRequest {
  AgentId from = 1;
  AgentId to = 2;
  string task_id = 3;
  double current_confidence = 4;
  repeated uint32 requested_chunk_indices = 5;
  Timestamp timestamp = 6;
}

message ContextResponse {
  string task_id = 1;
  repeated ContextChunk chunks = 2;
}
