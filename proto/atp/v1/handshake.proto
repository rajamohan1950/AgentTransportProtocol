syntax = "proto3";
package atp.v1;

import "atp/v1/common.proto";

message CapabilityProbe {
  AgentId from = 1;
  TaskType task_type = 2;
  QoSConstraints qos = 3;
  Embedding context_embedding = 4;
  uint64 nonce = 5;
  Timestamp timestamp = 6;
  bytes signature = 7;
}

message CapabilityOffer {
  AgentId from = 1;
  uint64 in_reply_to = 2;
  Capability capability = 3;
  double trust_score = 4;
  bytes trust_proof = 5;
  uint64 ttl_ms = 6;
  Timestamp timestamp = 7;
  bytes signature = 8;
}

message ContractAccept {
  AgentId from = 1;
  AgentId to = 2;
  QoSConstraints agreed_qos = 3;
  string context_plan = 4;
  string contract_id = 5;
  uint64 expires_ms = 6;
  Timestamp timestamp = 7;
  bytes signature = 8;
}

message ContractAck {
  string contract_id = 1;
  bool accepted = 2;
}
