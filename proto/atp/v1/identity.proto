syntax = "proto3";
package atp.v1;

import "atp/v1/common.proto";

message Did {
  string method = 1;
  string identifier = 2;
}

message AgentIdentity {
  AgentId id = 1;
  Did did = 2;
  bytes public_key = 3;
  repeated Capability capabilities = 4;
  Timestamp created_at = 5;
}

message TrustScore {
  AgentId agent = 1;
  TaskType task_type = 2;
  double score = 3;
  uint32 sample_count = 4;
  Timestamp last_updated = 5;
}

message InteractionProof {
  AgentId evaluator = 1;
  AgentId subject = 2;
  string task_id = 3;
  TaskType task_type = 4;
  double quality_score = 5;
  uint64 latency_ms = 6;
  double cost = 7;
  Timestamp timestamp = 8;
  bytes signature = 9;
}
