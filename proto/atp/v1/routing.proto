syntax = "proto3";
package atp.v1;

import "atp/v1/common.proto";

enum RoutingPattern {
  ROUTING_PATTERN_UNSPECIFIED = 0;
  ROUTING_PATTERN_DRAFT_REFINE = 1;
  ROUTING_PATTERN_PARALLEL_MERGE = 2;
  ROUTING_PATTERN_CASCADE = 3;
  ROUTING_PATTERN_ENSEMBLE = 4;
  ROUTING_PATTERN_PIPELINE = 5;
}

message RouteMetrics {
  double quality = 1;
  uint64 latency_ms = 2;
  double cost = 3;
}

message Route {
  string route_id = 1;
  RoutingPattern pattern = 2;
  repeated AgentId agents = 3;
  RouteMetrics metrics = 4;
  Timestamp computed_at = 5;
  uint64 ttl_ms = 6;
}

message RouteQuery {
  TaskType task_type = 1;
  QoSConstraints qos = 2;
  RoutingPattern preferred_pattern = 3;
  uint32 max_routes = 4;
}

message RouteResponse {
  repeated Route routes = 1;
}
