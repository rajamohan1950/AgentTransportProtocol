services:
  - type: web
    name: atp-website
    runtime: static
    buildCommand: echo "Static site — no build needed"
    staticPublishPath: ./website
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
